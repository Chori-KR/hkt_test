<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음 일기장 - 일기 쓰기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>오늘의 마음 일기 📝</h2>
    
    <div id="diary-form">
      <div class="form-group">
        <label for="studentName">이름</label>
        <input type="text" id="studentName" placeholder="이름을 입력해주세요" required>
      </div>
      
      <div class="form-group">
        <label for="emotion">오늘 나의 기분은?</label>
        <select id="emotion" required>
          <option value="" disabled selected>기분을 선택해주세요</option>
          <option value="아주 신남 😆">아주 신남 😆</option>
          <option value="기분 좋음 😊">기분 좋음 😊</option>
          <option value="그저 그래요 😐">그저 그래요 😐</option>
          <option value="조금 우울해요 😢">조금 우울해요 😢</option>
          <option value="화가 나요 😡">화가 나요 😡</option>
        </select>
      </div>

      <div class="form-group">
        <label for="content">오늘 있었던 일이나 생각을 편하게 적어주세요</label>
        <textarea id="content" placeholder="AI 선생님에게 하고 싶은 이야기를 자유롭게 써주세요..." required></textarea>
      </div>

      <button id="submitBtn" class="btn">일기 보내기 🚀</button>
      <div id="loadingMessage" class="message hidden" style="color: #6366f1;">
        ✨ AI 선생님이 일기를 읽고 있어요. 잠시만 기다려주세요... ✨
      </div>
      <div id="errorMessage" class="message error hidden"></div>
    </div>

    <!-- AI 선생님의 답장이 표시될 영역 -->
    <div id="responseArea" class="hidden" style="margin-top: 2rem;">
      <h3 style="color: var(--success-color); margin-bottom: 1rem;">💌 AI 선생님의 답장</h3>
      <div id="aiResponseContent" class="ai-response">
        <!-- AI 응답 내용이 여기에 렌더링됩니다. -->
      </div>
      <button onclick="location.reload()" class="btn btn-secondary" style="margin-top: 1.5rem;">새로운 일기 쓰기</button>
      <button onclick="location.href='index.html'" class="btn btn-secondary" style="border: none; color: var(--text-muted);">처음으로 돌아가기</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
